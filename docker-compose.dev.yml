services:
  postgres:
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  backend:
    environment:
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/3205-test?schema=public

  directus:
    ports:
      - "8055:8055"
    environment:
      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL:-http://localhost:8055}
