services:
  postgres:
    image: postgres:16-alpine
    container_name: 3205-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-3205-test}
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-3205-test}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      app:
        aliases:
          - postgres
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: 3205-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      app:
        aliases:
          - redis
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 3205-backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-3205-test}
      POSTGRES_HOST: 3205-postgres
      REDIS_HOST: 3205-redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app
    restart: unless-stopped

volumes:
  postgres_data_v2:
    name: 3205_postgres_data_v2

networks:
  app:
    name: 3205-app
