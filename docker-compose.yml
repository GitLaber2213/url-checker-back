services:
  postgres:
    image: postgres:16-alpine
    container_name: 3205-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-3205-test}
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-3205-test}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      app:
        aliases:
          - postgres
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: 3205-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      app:
        aliases:
          - redis
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 3205-backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-3205-test}
      POSTGRES_HOST: 3205-postgres
      REDIS_HOST: 3205-redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app
    restart: unless-stopped

  directus:
    image: directus/directus:11
    container_name: 3205-directus
    ports:
      - "127.0.0.1:8055:8055"
    volumes:
      - directus_uploads:/directus/uploads
    environment:
      KEY: ${DIRECTUS_KEY:?Set DIRECTUS_KEY in .env}
      SECRET: ${DIRECTUS_SECRET:?Set DIRECTUS_SECRET in .env}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:?Set DIRECTUS_ADMIN_EMAIL in .env}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:?Set DIRECTUS_ADMIN_PASSWORD in .env}
      DB_CLIENT: pg
      DB_HOST: 3205-postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-3205-test}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      WEBSOCKETS_ENABLED: "true"
      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL:-http://localhost:8055}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app
    restart: unless-stopped

volumes:
  postgres_data_v2:
    name: 3205_postgres_data_v2
  directus_uploads:
    name: 3205_directus_uploads

networks:
  app:
    name: 3205-app
